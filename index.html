<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>移動販売POS</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0f1419; --surface:#1a2332; --card:#1e2a3a; --accent:#00c6ae;
  --commission:#ff9f43; --danger:#ff6b6b; --text:#e8eaed; --dim:#8899a6;
  --border:#2a3a4a; --success:#00e676;
}
body { font-family:'Hiragino Sans','Noto Sans JP',sans-serif; background:var(--bg); color:var(--text);
  max-width:480px; margin:0 auto; min-height:100vh; -webkit-tap-highlight-color:transparent; user-select:none; font-size:14px; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
input[type="number"] { -moz-appearance:textfield; }
.header { background:linear-gradient(135deg,var(--surface),#162030); padding:14px 16px 10px;
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.logo { font-size:18px; font-weight:800; background:linear-gradient(135deg,var(--accent),#00e5ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.badge-on { font-size:9px; background:var(--success); color:#000; padding:2px 6px; border-radius:4px; font-weight:700; margin-left:6px; }
.settings-btn { display:flex; align-items:center; gap:6px; background:var(--card); padding:5px 10px;
  border-radius:6px; font-size:12px; border:1px solid var(--border); color:var(--text); cursor:pointer; }
.tabs { display:flex; gap:4px; overflow-x:auto; padding-bottom:2px; margin-top:8px; }
.tab { padding:6px 12px; border-radius:16px; font-size:12px; border:1px solid var(--border);
  background:transparent; color:var(--dim); cursor:pointer; white-space:nowrap; }
.tab.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:12px; }
.product { background:var(--card); border-radius:10px; padding:12px 8px; text-align:center;
  cursor:pointer; border:1px solid var(--border); position:relative; overflow:hidden; }
.product.consign { background:linear-gradient(145deg,#2a2a1a,#1e2a1a); border-color:#3a4a2a; }
.product-name { font-size:13px; font-weight:600; line-height:1.3; margin-bottom:6px; }
.product-price { font-size:17px; font-weight:800; color:var(--accent); }
.product-shop { font-size:10px; color:var(--commission); margin-top:2px; }
.badge-consign { position:absolute; top:4px; right:4px; background:var(--commission); color:#000;
  font-size:9px; font-weight:700; padding:2px 5px; border-radius:4px; }
.badge-qty { position:absolute; top:4px; left:4px; background:var(--accent); color:#000;
  font-size:11px; font-weight:800; width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; }
.bottom-bar { position:sticky; bottom:56px; background:var(--surface); border-top:1px solid var(--border); padding:12px; }
.pay-btn { background:linear-gradient(135deg,var(--accent),#00e5a0); color:#000; border:none;
  border-radius:12px; padding:16px; font-size:18px; font-weight:800; width:100%; cursor:pointer; letter-spacing:1px; }
.pay-btn:disabled { opacity:0.4; cursor:not-allowed; }
.secondary-btn { background:var(--card); color:var(--text); border:none; border-radius:12px;
  padding:14px; font-size:14px; font-weight:800; cursor:pointer; }
.nav { display:flex; justify-content:space-around; padding:8px 0; background:var(--surface);
  border-top:1px solid var(--border); position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; z-index:100; }
.nav-btn { display:flex; flex-direction:column; align-items:center; gap:2px; background:none;
  border:none; color:var(--dim); font-size:10px; cursor:pointer; padding:4px 12px; }
.nav-btn.active { color:var(--accent); font-weight:700; }
.nav-btn .icon { font-size:20px; }
.cart-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
.qty-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--surface);
  color:var(--text); font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.remove-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--danger); background:var(--surface);
  color:var(--danger); font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-left:4px; }
.quick-btn { border-radius:10px; padding:14px 8px; font-size:16px; font-weight:700; cursor:pointer; text-align:center;
  background:var(--card); color:var(--text); border:1px solid var(--border); }
.quick-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
.stat { background:var(--card); border-radius:10px; padding:12px 14px; border:1px solid var(--border); }
.flash { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,198,174,0.95);
  color:#000; padding:12px 28px; border-radius:12px; font-weight:800; font-size:16px; z-index:9999; pointer-events:none; }
.sync-badge { position:fixed; top:8px; left:50%; transform:translateX(-50%); padding:6px 16px;
  border-radius:20px; font-weight:700; font-size:13px; z-index:9999; color:#000; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
.modal { background:var(--surface); border-radius:16px; padding:20px; width:100%; max-width:400px; border:1px solid var(--border); }
.input { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:13px; width:100%; box-sizing:border-box; }
.content { padding-bottom:56px; }
select { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Data ──
const PRODUCTS = [
  {id:1,name:"トイレットペーパー(シングル18ロール)",price:1100,cost:1100,cat:"雑貨",type:"自社仕入"},
  {id:2,name:"トイレットペーパー(ダブル18ロール)",price:1100,cost:1100,cat:"雑貨",type:"自社仕入"},
  {id:3,name:"BOXティッシュ（5箱入り）",price:620,cost:620,cat:"雑貨",type:"自社仕入"},
  {id:4,name:"こわれ煎餅",price:250,cost:250,cat:"お菓子",type:"自社仕入"},
  {id:5,name:"厚焼きピーナッツこわれ煎餅",price:250,cost:250,cat:"お菓子",type:"自社仕入"},
  {id:6,name:"ごまちーず煎餅",price:250,cost:250,cat:"お菓子",type:"自社仕入"},
  {id:7,name:"うす焼きこわれ煎餅",price:250,cost:250,cat:"お菓子",type:"自社仕入"},
  {id:8,name:"うす焼きこわれピーナッツ煎餅",price:250,cost:250,cat:"お菓子",type:"自社仕入"},
  {id:9,name:"はね出し海苔",price:550,cost:550,cat:"食品",type:"自社仕入"},
  {id:10,name:"島田うどん",price:300,cost:300,cat:"食品",type:"自社仕入"},
  {id:11,name:"カレーせんべい",price:700,cost:700,cat:"お菓子",type:"自社仕入"},
  {id:12,name:"いわきあられ",price:450,cost:450,cat:"お菓子",type:"自社仕入"},
  {id:13,name:"羊かん",price:1200,cost:1200,cat:"お菓子",type:"自社仕入"},
  {id:14,name:"ほうれん草",price:170,cost:170,cat:"野菜",type:"自社仕入"},
  {id:15,name:"ねぎ",price:160,cost:160,cat:"野菜",type:"自社仕入"},
  {id:16,name:"小松菜",price:140,cost:140,cat:"野菜",type:"自社仕入"},
  {id:17,name:"しいたけ",price:260,cost:260,cat:"野菜",type:"自社仕入"},
  {id:18,name:"たらの芽",price:250,cost:250,cat:"野菜",type:"自社仕入"},
  {id:19,name:"ミニトマト",price:380,cost:380,cat:"野菜",type:"自社仕入"},
  {id:20,name:"トマト",price:150,cost:150,cat:"野菜",type:"自社仕入"},
  {id:21,name:"切干大根",price:360,cost:360,cat:"野菜",type:"自社仕入"},
  {id:22,name:"くるみ",price:900,cost:900,cat:"野菜",type:"自社仕入"},
  {id:23,name:"乾燥しいたけ",price:550,cost:550,cat:"野菜",type:"自社仕入"},
  {id:101,name:"ぶり塩焼き弁当",price:850,cost:750,cat:"弁当",type:"委託販売",shop:"けんぽ"},
  {id:102,name:"鮭塩焼き弁当",price:850,cost:750,cat:"弁当",type:"委託販売",shop:"けんぽ"},
  {id:103,name:"生姜焼き弁当",price:950,cost:850,cat:"弁当",type:"委託販売",shop:"男のばんごはん"},
  {id:104,name:"オムライス",price:800,cost:700,cat:"惣菜",type:"委託販売",shop:"男のばんごはん"},
  {id:105,name:"唐揚げ",price:400,cost:300,cat:"惣菜",type:"委託販売",shop:"男のばんごはん"},
  {id:106,name:"エビフライ",price:400,cost:300,cat:"惣菜",type:"委託販売",shop:"男のばんごはん"},
];
const COMMISSION=100;
const LOCATIONS=["貫井けやきけ公園","東町シナノキ公園","商業施設A","オフィス街B","マルシェ会場"];
const ATTRS=["","10代","20代男性","20代女性","30代男性","30代女性","40代男性","40代女性","50代男性","50代女性","60代以上"];
const CATEGORIES=["全て","雑貨","お菓子","食品","野菜","弁当","惣菜"];
const fmt=n=>n.toLocaleString("ja-JP");

// ── State ──
let state = {
  cart:[], view:"menu", catFilter:"全て", received:"", location:LOCATIONS[0],
  attr:"", comment:"", transactions:[], flash:null, showSettings:false,
  gasUrl:localStorage.getItem("pos_gas_url")||"", gasUrlInput:localStorage.getItem("pos_gas_url")||"",
  syncStatus:null
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ── Helpers ──
function getTotal() { return state.cart.reduce((s,i)=>s+i.price*i.qty,0); }
function getTotalQty() { return state.cart.reduce((s,i)=>s+i.qty,0); }
function getTotalProfit() {
  return state.cart.reduce((s,i)=>{
    if(i.type==="自社仕入") return s+(i.price-i.cost)*i.qty;
    return s+COMMISSION*i.qty;
  },0);
}
function getTotalCommission() { return state.cart.reduce((s,i)=>s+(i.type==="委託販売"?COMMISSION*i.qty:0),0); }

function showFlash(msg) {
  setState({flash:msg});
  setTimeout(()=>setState({flash:null}),1200);
}

function addToCart(product) {
  const cart=[...state.cart];
  const ex=cart.find(i=>i.id===product.id);
  if(ex) ex.qty++;
  else cart.push({...product,qty:1});
  setState({cart});
  showFlash(product.name);
}

function updateQty(id,delta) {
  const cart=state.cart.map(i=>i.id===id?{...i,qty:i.qty+delta}:i).filter(i=>i.qty>0);
  setState({cart});
}

function removeItem(id) { setState({cart:state.cart.filter(i=>i.id!==id)}); }

function sendToSheets(tx) {
  if(!state.gasUrl) return;
  setState({syncStatus:"sending"});
  try {
    const now=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const dateStr=`${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;
    const timeStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    const items=tx.items.map(item=>({
      date:dateStr, time:timeStr, location:tx.location, type:item.type,
      shop:item.shop||"", productName:item.name, qty:item.qty, attr:tx.attr||"", comment:tx.comment||""
    }));
    const payload=encodeURIComponent(JSON.stringify({items}));
    const callbackName='gasCallback_'+Date.now();
    // JSONP: scriptタグで送信（全ブラウザで動作、CORS制限なし）
    window[callbackName]=function(result){
      setState({syncStatus:"ok"});
      setTimeout(function(){setState({syncStatus:null});},3000);
      delete window[callbackName];
    };
    var script=document.createElement('script');
    script.src=state.gasUrl+'?callback='+callbackName+'&data='+payload;
    script.onerror=function(){
      // scriptタグのエラーでも、GASへのリクエスト自体は成功している場合がある
      setState({syncStatus:"ok"});
      setTimeout(function(){setState({syncStatus:null});},3000);
      delete window[callbackName];
    };
    document.body.appendChild(script);
    // 使い終わったscriptタグを削除
    setTimeout(function(){try{document.body.removeChild(script);}catch(e){}},10000);
  } catch(err) {
    setState({syncStatus:"error"});
    setTimeout(function(){setState({syncStatus:null});},5000);
  }
}

function completeSale() {
  const now=new Date();
  const total=getTotal();
  const tx={
    id:Date.now(), time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`,
    date:`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`,
    location:state.location, attr:state.attr, comment:state.comment,
    items:[...state.cart], total, totalCommission:getTotalCommission(),
    totalProfit:getTotalProfit(), received:parseInt(state.received)||0,
    change:(parseInt(state.received)||0)-total
  };
  const transactions=[tx,...state.transactions];
  setState({transactions, cart:[], received:"", comment:"", attr:"", view:"done"});
  sendToSheets(tx);
}

function exportText() {
  const txs=state.transactions;
  if(!txs.length) return;
  let txt=`【${txs[0].date}売上記録】\n場所: ${state.location}\n取引数: ${txs.length}\n売上合計: ¥${fmt(txs.reduce((s,t)=>s+t.total,0))}\n粗利合計: ¥${fmt(txs.reduce((s,t)=>s+t.totalProfit,0))}\n\n`;
  txs.forEach(t=>{
    txt+=`--- ${t.time} ---\n`;
    t.items.forEach(it=>{ txt+=`  ${it.name} ×${it.qty} ¥${fmt(it.price*it.qty)}${it.type==="委託販売"?" [委託]":""}\n`; });
    txt+=`  合計: ¥${fmt(t.total)}　粗利: ¥${fmt(t.totalProfit)}\n\n`;
  });
  navigator.clipboard?.writeText(txt);
  showFlash("コピーしました");
}

function saveGasUrl() {
  localStorage.setItem("pos_gas_url", state.gasUrlInput);
  setState({gasUrl:state.gasUrlInput});
  showFlash("URL保存完了");
}

// ── Render ──
function render() {
  const app=document.getElementById("app");
  const total=getTotal(), totalQty=getTotalQty(), totalProfit=getTotalProfit();
  const receivedNum=parseInt(state.received)||0, change=receivedNum-total;
  const filtered=state.catFilter==="全て"?PRODUCTS:PRODUCTS.filter(p=>p.cat===state.catFilter);
  const todayTotal=state.transactions.reduce((s,t)=>s+t.total,0);
  const todayProfit=state.transactions.reduce((s,t)=>s+t.totalProfit,0);
  const lastTx=state.transactions[0];

  let html = '';

  // Flash
  if(state.flash) html+=`<div class="flash">${state.flash}</div>`;

  // Sync badge
  if(state.syncStatus) {
    const cfg={sending:{bg:"var(--commission)",t:"⏳ 送信中..."},ok:{bg:"var(--success)",t:"✓ 送信完了"},error:{bg:"var(--danger)",t:"✕ 送信失敗"}}[state.syncStatus];
    html+=`<div class="sync-badge" style="background:${cfg.bg}">${cfg.t}</div>`;
  }

  // Settings overlay
  if(state.showSettings) {
    html+=`<div class="overlay" onclick="setState({showSettings:false})">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="font-size:18px;font-weight:800;margin-bottom:16px;color:var(--accent)">⚙ 設定</div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:6px">販売場所</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px">
          ${LOCATIONS.map(loc=>`<button onclick="setState({location:'${loc}'})" style="padding:8px 12px;border-radius:8px;border:1px solid ${state.location===loc?'var(--accent)':'var(--border)'};background:${state.location===loc?'var(--accent)':'transparent'};color:${state.location===loc?'#000':'var(--text)'};font-weight:${state.location===loc?700:400};font-size:13px;cursor:pointer">${loc}</button>`).join('')}
        </div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:6px">Google Sheets連携URL</div>
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Apps ScriptのウェブアプリURLを貼り付け</div>
        <input class="input" type="text" value="${state.gasUrlInput}" oninput="state.gasUrlInput=this.value"
          placeholder="https://script.google.com/macros/s/.../exec" style="margin-bottom:8px">
        <button onclick="saveGasUrl()" style="width:100%;padding:10px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px">URLを保存</button>
        ${state.gasUrl?'<div style="font-size:11px;color:var(--success);margin-bottom:12px">✓ 連携設定済み</div>':'<div style="font-size:11px;color:var(--dim);margin-bottom:12px">未設定</div>'}
        <button onclick="setState({showSettings:false})" style="width:100%;padding:10px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;font-weight:700;font-size:14px;cursor:pointer">閉じる</button>
      </div>
    </div>`;
  }

  // Header
  html+=`<div class="header">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${state.view==='menu'||state.view==='done'?'8':'0'}px">
      <div style="display:flex;align-items:center"><span class="logo">移動販売POS</span>${state.gasUrl?'<span class="badge-on">連携ON</span>':''}</div>
      <div class="settings-btn" onclick="setState({showSettings:true})">⚙ ${state.location}</div>
    </div>
    ${state.view==='menu'||state.view==='done'?`<div class="tabs">${CATEGORIES.map(cat=>`<button class="tab ${state.catFilter===cat?'active':''}" onclick="setState({catFilter:'${cat}'})">${cat}</button>`).join('')}</div>`:''}
  </div>`;

  // Content
  html+='<div class="content">';

  if(state.view==='menu') {
    html+='<div class="grid">';
    filtered.forEach(p=>{
      const inCart=state.cart.find(i=>i.id===p.id);
      html+=`<div class="product ${p.type==='委託販売'?'consign':''}" onclick="addToCart(PRODUCTS.find(x=>x.id===${p.id}))">
        ${p.type==='委託販売'?'<span class="badge-consign">委託</span>':''}
        ${inCart?`<span class="badge-qty">${inCart.qty}</span>`:''}
        <div class="product-name">${p.name}</div>
        <div class="product-price">¥${fmt(p.price)}</div>
        ${p.shop?`<div class="product-shop">${p.shop}</div>`:''}
      </div>`;
    });
    html+='</div>';
    if(state.cart.length>0) {
      html+=`<div class="bottom-bar">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--dim)">
          <span>${totalQty}点</span><span>粗利 ¥${fmt(totalProfit)}</span>
        </div>
        <button class="pay-btn" onclick="setState({view:'cart'})">会計へ ¥${fmt(total)}</button>
      </div>`;
    }
  }

  else if(state.view==='cart') {
    html+=`<div style="padding:12px 16px;font-size:16px;font-weight:700;border-bottom:1px solid var(--border)">注文内容</div>`;
    if(!state.cart.length) html+='<div style="padding:40px;text-align:center;color:var(--dim)">カートは空です</div>';
    state.cart.forEach(item=>{
      html+=`<div class="cart-item">
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px">${item.name} ${item.type==='委託販売'?'<span style="font-size:10px;background:var(--commission);color:#000;padding:1px 5px;border-radius:3px;font-weight:700">委託</span>':''}</div>
          <div style="font-size:13px;color:var(--dim);margin-top:2px">¥${fmt(item.price)} × ${item.qty} = ¥${fmt(item.price*item.qty)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="qty-btn" onclick="updateQty(${item.id},-1)">−</button>
          <span style="font-weight:800;font-size:18px;width:28px;text-align:center">${item.qty}</span>
          <button class="qty-btn" onclick="updateQty(${item.id},1)">+</button>
          <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
        </div>
      </div>`;
    });
    if(state.cart.length>0) {
      html+=`<div style="padding:16px;border-top:1px solid var(--border)">
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <select class="input" style="flex:1" onchange="setState({attr:this.value})">
            <option value="">顧客属性</option>
            ${ATTRS.filter(Boolean).map(a=>`<option value="${a}" ${state.attr===a?'selected':''}>${a}</option>`).join('')}
          </select>
        </div>
        <input class="input" type="text" placeholder="コメント（任意）" value="${state.comment}" oninput="setState({comment:this.value})">
      </div>
      <div class="bottom-bar">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--dim)">小計</span><span style="font-weight:800;font-size:22px">¥${fmt(total)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:12px;color:var(--dim)">
          <span>${totalQty}点</span><span>粗利 ¥${fmt(totalProfit)}</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="secondary-btn" style="flex:1" onclick="setState({view:'menu'})">戻る</button>
          <button class="pay-btn" style="flex:2" onclick="setState({view:'pay',received:''})">お会計</button>
        </div>
      </div>`;
    }
  }

  else if(state.view==='pay') {
    const quicks=[500,1000,2000,5000,10000].filter(a=>a>=total);
    html+=`<div style="padding:16px">
      <div style="text-align:center;margin-bottom:20px">
        <div style="color:var(--dim);font-size:13px;margin-bottom:4px">お会計</div>
        <div style="font-size:36px;font-weight:800;letter-spacing:-1px">¥${fmt(total)}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
        ${quicks.map(a=>`<button class="quick-btn ${receivedNum===a?'active':''}" onclick="setState({received:'${a}'})">&yen;${fmt(a)}</button>`).join('')}
        <button class="quick-btn ${receivedNum===total?'active':''}" onclick="setState({received:'${total}'})">ピッタリ</button>
      </div>
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--dim);margin-bottom:4px">お預かり金額</div>
        <input id="recv-input" type="number" inputmode="numeric" value="${state.received}" oninput="updateReceived(this.value)"
          placeholder="金額を入力"
          style="width:100%;background:var(--card);color:var(--text);border:2px solid ${receivedNum>=total?'var(--accent)':'var(--border)'};
          border-radius:12px;padding:14px 16px;font-size:24px;font-weight:700;text-align:right">
      </div>
      <div id="change-display">
      ${receivedNum>0?`<div style="background:${change>=0?'linear-gradient(135deg,#0a2a20,#0a3025)':'linear-gradient(135deg,#2a1a1a,#301a1a)'};
        border-radius:12px;padding:20px;text-align:center;margin-bottom:16px;border:1px solid ${change>=0?'#1a4a3a':'#4a1a1a'}">
        <div style="font-size:13px;color:${change>=0?'var(--accent)':'var(--danger)'};margin-bottom:4px">${change>=0?'おつり':'不足'}</div>
        <div style="font-size:32px;font-weight:800;color:${change>=0?'var(--success)':'var(--danger)'}">¥${fmt(Math.abs(change))}</div>
      </div>`:''}
      </div>
      <div style="display:flex;gap:8px">
        <button class="secondary-btn" style="flex:1" onclick="setState({view:'cart'})">戻る</button>
        <button id="complete-btn" class="pay-btn" style="flex:2;opacity:${receivedNum>=total?1:0.4};cursor:${receivedNum>=total?'pointer':'not-allowed'}" ${receivedNum>=total?`onclick="completeSale()"`:'disabled'}>会計完了</button>
      </div>
    </div>`;
  }

  else if(state.view==='done') {
    html+=`<div style="padding:16px;text-align:center">
      <div style="font-size:48px;margin-bottom:8px">✓</div>
      <div style="font-size:22px;font-weight:800;color:var(--success);margin-bottom:4px">会計完了</div>
      ${state.gasUrl?'<div style="font-size:12px;color:var(--accent);margin-bottom:12px">📊 スプレッドシートに自動送信済み</div>':'<div style="font-size:12px;color:var(--commission);margin-bottom:12px">⚠ シート連携未設定</div>'}
      ${lastTx?`<div style="margin-top:16px;text-align:left">
        <div class="stat" style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--dim)">売上</span><span style="font-weight:800;font-size:20px">¥${fmt(lastTx.total)}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--dim);font-size:12px">お預かり</span><span>¥${fmt(lastTx.received)}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--dim);font-size:12px">おつり</span><span style="color:var(--success)">¥${fmt(lastTx.change)}</span></div>
        </div>
        <div class="stat">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--dim);font-size:12px">粗利</span><span style="color:var(--accent);font-weight:700">¥${fmt(lastTx.totalProfit)}</span></div>
          ${lastTx.totalCommission>0?`<div style="display:flex;justify-content:space-between"><span style="color:var(--dim);font-size:12px">うち手数料</span><span style="color:var(--commission)">¥${fmt(lastTx.totalCommission)}</span></div>`:''}
        </div>
      </div>`:''}
      <button class="pay-btn" style="margin-top:20px" onclick="setState({view:'menu'})">次のお客様へ</button>
    </div>`;
  }

  else if(state.view==='log') {
    const cnt=state.transactions.length;
    html+=`<div style="padding:16px">
      <div style="font-size:16px;font-weight:700;margin-bottom:12px">本日の売上記録</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
        <div class="stat"><div style="font-size:10px;color:var(--dim)">取引数</div><div style="font-size:20px;font-weight:800">${cnt}</div></div>
        <div class="stat"><div style="font-size:10px;color:var(--dim)">売上合計</div><div style="font-size:14px;font-weight:800;color:var(--accent)">¥${fmt(todayTotal)}</div></div>
        <div class="stat"><div style="font-size:10px;color:var(--dim)">粗利合計</div><div style="font-size:14px;font-weight:800;color:var(--success)">¥${fmt(todayProfit)}</div></div>
      </div>
      ${cnt>0?`<button onclick="exportText()" style="width:100%;padding:10px;background:var(--card);color:var(--accent);border:1px solid var(--accent);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:16px">売上記録をコピー（テキスト）</button>`:''}
    </div>`;
    state.transactions.forEach(tx=>{
      html+=`<div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:700">${tx.time}</span><span style="font-weight:800;font-size:16px">¥${fmt(tx.total)}</span></div>
        ${tx.items.map(it=>`<div style="font-size:12px;color:var(--dim);display:flex;justify-content:space-between"><span>${it.name} ×${it.qty}${it.type==='委託販売'?'<span style="color:var(--commission)"> [委託]</span>':''}</span><span>¥${fmt(it.price*it.qty)}</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:12px"><span style="color:var(--accent)">粗利 ¥${fmt(tx.totalProfit)}</span>${tx.attr?`<span style="color:var(--dim)">${tx.attr}</span>`:''}</div>
      </div>`;
    });
    if(!cnt) html+='<div style="padding:40px;text-align:center;color:var(--dim)">まだ取引がありません</div>';
  }

  html+='</div>';

  // Nav
  html+=`<div class="nav">
    ${[['menu','🏪','メニュー'],['cart','🛒',`カート${getTotalQty()>0?'('+getTotalQty()+')':''}`],['log','📊','売上記録']].map(([v,icon,label])=>
      `<button class="nav-btn ${state.view===v?'active':''}" onclick="setState({view:'${v}'})"><span class="icon">${icon}</span><span>${label}</span></button>`
    ).join('')}
  </div>`;

  app.innerHTML=html;

  // Pay画面のinputフォーカスを復元
  if(state.view==='pay') {
    var inp=document.getElementById('recv-input');
    if(inp) { inp.focus(); }
  }
}

// 収受金額の更新（フォーカスを失わないように部分更新）
function updateReceived(val) {
  state.received = val;
  var receivedNum = parseInt(val) || 0;
  var total = getTotal();
  var change = receivedNum - total;
  // おつり表示を部分更新
  var changeDiv = document.getElementById('change-display');
  if(changeDiv) {
    if(receivedNum > 0) {
      changeDiv.innerHTML = `<div style="background:${change>=0?'linear-gradient(135deg,#0a2a20,#0a3025)':'linear-gradient(135deg,#2a1a1a,#301a1a)'};
        border-radius:12px;padding:20px;text-align:center;margin-bottom:16px;border:1px solid ${change>=0?'#1a4a3a':'#4a1a1a'}">
        <div style="font-size:13px;color:${change>=0?'var(--accent)':'var(--danger)'};margin-bottom:4px">${change>=0?'おつり':'不足'}</div>
        <div style="font-size:32px;font-weight:800;color:${change>=0?'var(--success)':'var(--danger)'}">¥${fmt(Math.abs(change))}</div>
      </div>`;
    } else { changeDiv.innerHTML = ''; }
  }
  // ボタン状態更新
  var payBtn = document.getElementById('complete-btn');
  if(payBtn) {
    if(receivedNum >= total) { payBtn.disabled=false; payBtn.style.opacity='1'; payBtn.style.cursor='pointer'; payBtn.onclick=function(){completeSale();}; }
    else { payBtn.disabled=true; payBtn.style.opacity='0.4'; payBtn.style.cursor='not-allowed'; payBtn.onclick=null; }
  }
  // 入力欄のボーダー色更新
  var inp = document.getElementById('recv-input');
  if(inp) inp.style.borderColor = receivedNum>=total ? 'var(--accent)' : 'var(--border)';
}

render();
</script>
</body>
</html>
